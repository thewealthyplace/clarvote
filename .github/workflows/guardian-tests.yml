name: Guardian Contract Tests

on:
  push:
    paths:
      - 'contracts/clarvote-guardian*.clar'
      - 'contracts/clarvote-refund.clar'
      - 'contracts/clarvote-cancellation-log.clar'
      - 'tests/clarvote-guardian.test.ts'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Clarinet
        run: |
          curl -L https://github.com/hirosystems/clarinet/releases/latest/download/clarinet-linux-x64.tar.gz | tar xz
          sudo mv clarinet /usr/local/bin/

      - name: Install dependencies
        run: npm ci

      - name: Clarinet check
        run: clarinet check

      - name: Run guardian tests
        run: clarinet test tests/clarvote-guardian.test.ts

      - name: Run refund tests
        run: clarinet test tests/clarvote-refund.test.ts
